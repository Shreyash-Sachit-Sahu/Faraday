name: CI

on:
  push:
  pull_request:

jobs:
  ai-service:
    name: AI service (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r ai-service/requirements-dev.txt
      - name: Run tests
        working-directory: ai-service
        run: pytest -q

  backend:
    name: Backend (JUnit)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: faraday
          POSTGRES_PASSWORD: faraday
          POSTGRES_DB: faraday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faraday -d faraday"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      POSTGRES_USER: faraday
      POSTGRES_PASSWORD: faraday
      POSTGRES_DB: faraday
      GOOGLE_CLIENT_ID: ci-dummy-client-id
      UPLOADS_DIR: /tmp/faraday-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Generate a test JWT secret (base64, >= 32 bytes)
        run: echo "JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')" >> "$GITHUB_ENV"
      - name: Run tests
        working-directory: backend
        run: ./mvnw -B -ntp test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
